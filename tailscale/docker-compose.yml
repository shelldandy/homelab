services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: ${HOSTNAME:-homelab-tailscale}
    env_file: .env
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_ROUTES=${TS_ROUTES}
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=${TS_USERSPACE:-false}
      - TS_ACCEPT_DNS=${TS_ACCEPT_DNS:-true}
      - TS_HOSTNAME=${HOSTNAME:-homelab-tailscale}
    volumes:
      - ${CONFIG_PATH}/tailscale/state:/var/lib/tailscale
    network_mode: host
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    privileged: ${TS_PRIVILEGED:-false}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=false"
      - "docker-volume-backup.stop-during-backup=true"

