services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
    extends:
      file: hwaccel.transcoding.yml
      service: quicksync # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      - ${LIBRARY_BOWLINE}:/share/bowline
      - ${LIBRARY_WIFE}:/share/wife
    env_file:
      - .env
    depends_on:
      - redis
      - database
    restart: unless-stopped
    healthcheck:
      disable: false
    networks:
      - immich
      - frontend
    ports:
      - "2283:2283"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${SUBDOMAIN}.rule=Host(`${SUBDOMAIN}.bowline.im`)"
      - "traefik.http.services.${SUBDOMAIN}.loadbalancer.server.port=2283"
      # Immich-specific transport timeouts for large file uploads
      - "traefik.http.services.${SUBDOMAIN}.loadbalancer.responseForwarding.flushInterval=1s"
      # TODO: Apply these properly
      # - "traefik.http.routers.${SUBDOMAIN}.middlewares=immich-timeouts"
      # - "traefik.http.middlewares.immich-timeouts.timeout.readTimeout=600s"
      # - "traefik.http.middlewares.immich-timeouts.timeout.idleTimeout=600s"
      # - "traefik.http.middlewares.immich-timeouts.timeout.writeTimeout=600s"
      - "docker-volume-backup.stop-during-backup=true"

  immich-machine-learning:
    container_name: immich_machine_learning
    # For hardware acceleration, add one of -[armnn, cuda, rocm, openvino, rknn] to the image tag.
    # Example tag: ${IMMICH_VERSION}-cuda
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION}
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - ${DB_DATA_LOCATION}/cache:/cache
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      disable: false
    networks:
      - immich
    # Resource limits to prevent I/O overload
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:8-bookworm@sha256:ff21bc0f8194dc9c105b769aeabf9585fea6a8ed649c0781caeac5cb3c247884
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped
    networks:
      - immich

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0-pgvectors0.2.0
    environment:
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      # DB_STORAGE_TYPE: 'HDD'
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - ${DB_DATA_LOCATION}/data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - immich

  icloudpd-bowlinedandy:
    container_name: bowlinedandy
    env_file:
      - .env.ignore.bowlinedandy
    image: boredazfcuk/icloudpd:latest
    healthcheck:
      test: /usr/local/bin/healthcheck.sh
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ./data/icloudpd/config/bowlinedandy:/config
      - /mnt/immich/photos/bowlinedandy:/home/bowlinedandy/iCloud
    labels:
      - "docker-volume-backup.stop-during-backup=true"

  icloudpd-susifluna:
    container_name: susifluna
    env_file:
      - .env.ignore.susy
    image: boredazfcuk/icloudpd:latest
    healthcheck:
      test: /usr/local/bin/healthcheck.sh
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ./data/icloudpd/config/susifluna:/config
      - /mnt/immich/photos/susifluna:/home/susifluna/iCloud
    labels:
      - "docker-volume-backup.stop-during-backup=true"

  immich-library-scan:
    container_name: immich_library_scan
    image: curlimages/curl:latest
    restart: unless-stopped
    depends_on:
      immich-server:
        condition: service_healthy
    networks:
      - immich
    environment:
      IMMICH_API_KEY: ${IMMICH_API_KEY}
      LIBRARY_ID_BOWLINE: ${IMMICH_LIBRARY_ID_BOWLINE}
      LIBRARY_ID_WIFE: ${IMMICH_LIBRARY_ID_WIFE}
      SCAN_INTERVAL: ${SCAN_INTERVAL:-86400}
      INITIAL_DELAY: ${INITIAL_DELAY:-3600}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Waiting $${INITIAL_DELAY}s before first scan..."
        sleep $${INITIAL_DELAY}
        while true; do
          echo "[$(date)] Triggering library scan for bowline..."
          curl -s -X POST "http://immich-server:2283/api/libraries/$${LIBRARY_ID_BOWLINE}/scan" \
            -H "x-api-key: $${IMMICH_API_KEY}"
          echo ""
          echo "[$(date)] Triggering library scan for wife..."
          curl -s -X POST "http://immich-server:2283/api/libraries/$${LIBRARY_ID_WIFE}/scan" \
            -H "x-api-key: $${IMMICH_API_KEY}"
          echo ""
          echo "[$(date)] Scans triggered. Sleeping $${SCAN_INTERVAL}s..."
          sleep $${SCAN_INTERVAL}
        done

networks:
  frontend:
    external: true
  immich:
