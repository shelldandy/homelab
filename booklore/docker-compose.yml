services:
  booklore:
    image: grimmory/grimmory:latest
    container_name: booklore
    environment:
      USER_ID: ${PUID}
      GROUP_ID: ${PGID}
      TZ: ${TZ}
      DATABASE_URL: jdbc:mariadb://booklore-db:3306/booklore
      DATABASE_USERNAME: ${BOOKLORE_DB_USER}
      DATABASE_PASSWORD: ${BOOKLORE_DB_PASSWORD}
      JAVA_TOOL_OPTIONS: "-Xmx512m -Xms256m"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:6060/api/v1/healthcheck || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 300s
    depends_on:
      booklore-db:
        condition: service_healthy
    volumes:
      - ${CONFIG_PATH}/booklore/data:/app/data
      - ${MEDIA_SHARE}/media/books/booklore-library:/books
      - ${MEDIA_SHARE}/media/books/booklore-bookdrop:/bookdrop
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${BOOKLORE_SUBDOMAIN}.rule=Host(`${BOOKLORE_SUBDOMAIN}.bowline.im`)"
      - "traefik.http.services.${BOOKLORE_SUBDOMAIN}.loadbalancer.server.port=6060"
      - "docker-volume-backup.stop-during-backup=true"
    networks:
      - frontend

  booklore-db:
    image: lscr.io/linuxserver/mariadb:11.4.5
    container_name: booklore-db
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      MYSQL_ROOT_PASSWORD: ${BOOKLORE_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: booklore
      MYSQL_USER: ${BOOKLORE_DB_USER}
      MYSQL_PASSWORD: ${BOOKLORE_DB_PASSWORD}
    volumes:
      - ${CONFIG_PATH}/booklore/mariadb:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    labels:
      - "docker-volume-backup.stop-during-backup=true"
    networks:
      - frontend

  bookdl:
    image: ghcr.io/calibrain/calibre-web-automated-book-downloader:latest
    #image: ghcr.io/calibrain/shelfmark:latest
    container_name: bookdl
    # https://github.com/calibrain/shelfmark/blob/main/docs/environment-variables.md
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      FLASK_PORT: 8084
      FLASK_DEBUG: false
      CLOUDFLARE_PROXY_URL: http://cloudflarebypassforscraping:8000
      INGEST_DIR: /bookdrop
      BOOK_LANGUAGE: en,es
      SUPPORTED_FORMATS: epub,mobi,azw3,fb2,djvu,cbz,cbr,pdf
      AA_DONATOR_KEY: ${AA_DONATOR_KEY}
      SEARCH_MODE: direct
      AUTH_METHOD: oidc
      HIDE_LOCAL_AUTH: true
      OIDC_DISCOVERY_URL: https://auth.bowline.im/.well-known/openid-configuration
      OIDC_CLIENT_ID: ${BOOKDL_OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${BOOKDL_OIDC_CLIENT_SECRET}
      OIDC_SCOPES: openid profile email groups
      OIDC_GROUP_CLAIM: groups
      OIDC_ADMIN_GROUP: admins
      OIDC_USE_ADMIN_GROUP: true
      OIDC_AUTO_PROVISION: true
      OIDC_BUTTON_LABEL: "Pocket ID"
      ONBOARDING: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/request/api/status"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    volumes:
      - ${MEDIA_SHARE}/media/books/booklore-bookdrop:/bookdrop
    networks:
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${CALIBRE_WEB_DL_SUBDOMAIN}.rule=Host(`${CALIBRE_WEB_DL_SUBDOMAIN}.bowline.im`)"
      - "traefik.http.services.${CALIBRE_WEB_DL_SUBDOMAIN}.loadbalancer.server.port=8084"

networks:
  frontend:
    external: true
