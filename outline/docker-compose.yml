services:
  outline:
    image: docker.getoutline.com/outlinewiki/outline:latest
    container_name: outline
    ports:
      - "3000:3000"
    volumes:
      - ${CONFIG_PATH}:/var/lib/outline/data
    env_file:
      - ./.env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${SUBDOMAIN}.rule=Host(`${SUBDOMAIN}.bowline.im`)"
      - "traefik.http.services.${SUBDOMAIN}.loadbalancer.server.port=3000"
    networks:
      - outline
      - frontend

  redis:
    image: redis
    env_file: ./.env
    volumes:
      - ./redis.conf:/redis.conf
    ports:
      - "6379:6379"
    command: ["redis-server", "/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 3
    networks:
      - outline

  postgres:
    image: postgres
    env_file: ./.env
    ports:
      - "5432:5432"
    volumes:
      - database:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "outline", "-U", "user"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - outline

networks:
  frontend:
    external: true
  outline:

volumes:
  database:
    driver: local
  redis:
    driver: local
